name: Update market data

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate the market data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_data.py

      - name: Save the updated data file
        run: |
          git config user.name "market-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/market_data.json
          git commit -m "Update market data ($(date -u +%F))" || echo "No changes today."
          git push
